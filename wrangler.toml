name = "fluxpulse-release-dashboard"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for caching GitHub API responses
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID_HERE"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID_HERE"

[env.production]
  # Configure production-specific settings if needed
  # Secrets (set via `wrangler secret put`):
  #   GITHUB_TOKEN   — fine-grained PAT with repo:read, actions:write on all repos
  #   DASHBOARD_TOKEN — random string for auth (e.g., `openssl rand -base64 32`)
