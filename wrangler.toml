name = "fluxpulse-release-dashboard"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# KV namespace for caching GitHub API responses and storing sessions
[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID_HERE"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID_HERE"

[env.production]
  # Secrets managed via `wrangler secret put` (NEVER commit values):
  #
  #   GITHUB_TOKEN          — fine-grained PAT; needs read:org + repo:read + actions:write
  #   GITHUB_CLIENT_ID      — from GitHub OAuth App settings (safe to show in URLs)
  #   GITHUB_CLIENT_SECRET  — from GitHub OAuth App settings (sensitive, never commit)
